{% extends "base.html" %}

{% block content %}
<section class="admin-login-card">
    <h1>Admin Login</h1>

    <form method="post" class="admin-login-form">
        <label for="password">Password</label>

        <input
            id="password"
            name="password"
            type="password"
            class="input-field"
            required
        >

        <button type="submit" class="button button-primary">
            Login
        </button>
    </form>
</section>
{% endblock %}
