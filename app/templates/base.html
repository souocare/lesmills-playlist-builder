<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Les Mills Playlist Builder</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
    <header class="site-header">
        <nav class="nav">
            <a class="logo" href="{{ url_for('public.home') }}">Playlist Builder</a>

            <div class="nav-links">
                <a href="{{ url_for('public.home') }}">Programs</a>
                <a href="#">Login</a>
            </div>
        </nav>
    </header>

    <main class="page">
        {% block content %}{% endblock %}
    </main>

    <footer class="site-footer">
        <p>
            Unofficial playlist planning tool. Not affiliated with or endorsed by Les Mills.
        </p>
    </footer>
    <script src="{{ url_for('static', filename='js/playlist_builder.js') }}"></script>
</body>
</html>
